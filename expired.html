<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licencia Vencida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0c10;
      color: #dce8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111318;
      border: 1px solid #2a1520;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ef4444;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .btn-primary {
      display: inline-block;
      padding: 12px 28px;
      background: #00d4ff;
      color: #000;
      border-radius: 7px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.15s;
      margin-bottom: 12px;
      width: 100%;
    }

    .btn-primary:hover { background: #00bde0; }

    .contact {
      font-size: 12px;
      color: #334455;
      margin-top: 16px;
    }

    .contact a {
      color: #64748b;
      text-decoration: none;
    }

    .contact a:hover { color: #00d4ff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">⏰</div>
    <h1>Licencia Vencida</h1>
    <p>
      La licencia de este software ha expirado.<br>
      Para continuar usando el sistema, active una nueva licencia<br>
      o renueve la existente.
    </p>

    <a href="/license/activate/" class="btn-primary">
      Renovar / Activar Licencia →
    </a>

    <p class="contact">
      ¿Necesita ayuda?
      <a href="mailto:soporte@tuempresa.com">soporte@tuempresa.com</a>
    </p>
  </div>
</body>
</html>
